# mise-en-place configuration for context-radar.
# https://mise.jdx.dev  Install mise, then run `mise install` to get the pinned
# toolchain, and `mise run lint` / `mise run fmt` to check or format the docs.

[settings]
# Only install tool versions released more than 7 days ago. This mirrors
# Renovate's minimumReleaseAge (renovate.json) so the two agree on which
# versions are eligible: Renovate never opens a bump for a version mise would
# refuse to install. Keep the two values in step. Pinned here (not only in a
# personal global config) so CI and fresh clones enforce the same floor.
minimum_release_age = "7d"

[tools]
# Git hook runner and its config language.
hk = "1.50.0"
pkl = "0.31.1"
# Formatters and linters for markdown, YAML, HTML, and JSON.
prettier = "3.9.4"
"markdownlint-cli2" = "0.23.0"
yamllint = "1.38.0"
# Runtime for the JS-based tools above.
node = "lts"
# Package manager and runtime for the Vite/TypeScript site build.
bun = "1.3.14"
# TypeScript linter and formatter for the site source.
"npm:@biomejs/biome" = "2.1.0"
# GitHub Actions workflow linter.
actionlint = "1.7.12"
# tessl CLI: manages the local skill plugin declared in tessl.json.
"npm:@tessl/cli" = "0.90.0"
# Headless-browser automation for visually verifying the site during development.
"npm:agent-browser" = "0.31.1"
# impeccable: production-grade frontend design/refinement skill (critique, polish,
# audit, adapt, ...). Invoked via /impeccable; writes snapshots to .impeccable/
# (git-ignored). Pinned so the CI design gate (mise run design:check) stays
# deterministic; bump deliberately and re-run the gate.
"npm:impeccable" = "3.2.1"

[hooks]
# Install the git hooks after tools are installed. Runs on every `mise install`,
# including a no-op install where all tools are already present.
postinstall = "hk install"

# On entering the project directory (requires `mise activate` in your shell),
# install any missing tools. That install fires the postinstall hook above, so
# dependencies and the git hooks are both set up in one step.
enter = "mise install"

[tasks.install]
description = "Install the JS dependencies for the site build (reproducible, from the lockfile)"
run = "bun install --frozen-lockfile"

[tasks.dev]
description = "Run the Vite dev server for the site"
run = "bun run dev"

[tasks.build]
description = "Type-check and build the static site into docs/"
run = "bun run build"

[tasks.typecheck]
description = "Type-check the TypeScript sources (no emit)"
run = "bun run typecheck"

[tasks.test]
description = "Run the collocated unit tests (vitest)"
run = "bun run test"

[tasks."test:coverage"]
description = "Run tests with whole-project coverage and enforce the ratchet floor"
run = "bun run test:coverage"

[tasks.lint]
description = "Check markdown, YAML, HTML, JSON, and TypeScript across all files (no changes)"
run = "hk check --all"

[tasks.validate]
description = "Validate the canonical JSON store against the Zod schema"
run = "bun run validate"

[tasks."design:check"]
# Deterministic design-quality gate. Reads the root DESIGN.md and the committed
# .impeccable/config.json (documented ignores), so it enforces token/colour
# discipline and generic anti-pattern checks. Exit 2 on findings fails CI.
description = "Scan the site source for UI anti-patterns with the impeccable detector"
run = "impeccable detect src"

[tasks."data:add"]
description = "Validate a filled tool template (YAML) and upsert it into the JSON store"
run = "bun run data:add"

[tasks."gen:schema"]
description = "Regenerate the skill's JSON Schema from the Zod schema"
run = "bun run gen:schema"

[tasks."gen:icons"]
description = "Regenerate src/styles/icons.css from the Tabler outline SVGs"
run = "bun run gen:icons"

[tasks.freshness]
description = "Detect freshness drift (upstream version vs recorded) and write freshness-report.json"
run = "bun run freshness"

[tasks."freshness:sync"]
description = "Turn freshness-report.json into one GitHub issue per drifting tool in this repo"
run = "bun run freshness:sync"

[tasks.skill]
description = "Install the local tessl skill plugin declared in tessl.json"
# Scope to claude-code so tessl only wires the Claude skill link and does not
# create a stray .agents/ dir for its generic "agents" agent.
run = "tessl install --agent claude-code"

[tasks.fmt]
description = "Format and auto-fix markdown, YAML, HTML, and JSON in place"
run = "hk fix"

[tasks.hooks]
description = "Install the hk git hooks into this repository"
run = "hk install"
