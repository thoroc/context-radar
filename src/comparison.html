<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparison - Context Radar</title>
    <link rel="stylesheet" href="./comparison/comparison.css" />
  </head>
  <body>
    <div class="topbar">
      <a class="brand" href="./index.html">
        <span class="mark">Context Radar<span class="d">.</span></span>
        <span class="tag">Context reduction tools</span>
      </a>
      <nav>
        <a href="./index.html">Home</a>
        <a href="./comparison.html" class="active">Comparison</a>
        <a href="./stack-builder.html">Stack builder</a>
        <a href="./methodology.html">Methodology</a>
        <a href="./glossary.html">Glossary</a>
      </nav>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch theme"></button>
    </div>

    <div class="titleband">
      <h1>Context Reduction Tools</h1>
      <p class="sub" id="summary"></p>
    </div>

    <div class="toolbar">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <circle cx="11" cy="11" r="7" />
          <line x1="21" y1="21" x2="16.5" y2="16.5" />
        </svg>
        <input type="text" id="s" placeholder="Tool, layer, requirements, verdict&hellip;" />
      </div>
      <div class="fgroup">
        <label for="fl">Layer</label>
        <select id="fl">
          <option value="">All layers</option>
          <option>Shell output</option>
          <option>All tool output</option>
          <option>Static context injection (push model)</option>
          <option>Conversation history management</option>
          <option>Personal knowledge retrieval</option>
          <option>Library documentation retrieval</option>
          <option>Codebase understanding &amp; onboarding</option>
          <option>Code navigation</option>
          <option>Architecture violation detection</option>
          <option>MCP definition tokens</option>
          <option>Agent memory persistence</option>
          <option>Cross-session governance</option>
          <option>Response verbosity &amp; memory compression</option>
          <option>Config stack audit &amp; optimisation</option>
          <option>Agent safety enforcement</option>
          <option>Agent runtime &amp; context orchestration</option>
          <option>Universal context compression middleware</option>
          <option>Reference resource (curated list)</option>
          <option>Code generation minimalism (YAGNI enforcement)</option>
          <option>Tabular data retrieval</option>
        </select>
      </div>
      <div class="fgroup">
        <label>Verdict</label>
        <div class="ms">
          <button type="button" class="ms-toggle" id="fv-toggle" aria-haspopup="true" aria-expanded="false">
            All verdicts
          </button>
          <div class="ms-panel" id="fv" role="group" aria-label="Filter by verdict" hidden>
            <label class="ms-opt"><input type="checkbox" value="best" />Best</label>
            <label class="ms-opt"><input type="checkbox" value="add" />Add</label>
            <label class="ms-opt"><input type="checkbox" value="either-or" />Either/or</label>
            <label class="ms-opt"><input type="checkbox" value="watch" />Watch</label>
            <label class="ms-opt"><input type="checkbox" value="reference" />Reference</label>
            <label class="ms-opt"><input type="checkbox" value="drop" />Drop</label>
          </div>
        </div>
      </div>
      <div class="fgroup">
        <label>Activity</label>
        <div class="ms">
          <button type="button" class="ms-toggle" id="fa-toggle" aria-haspopup="true" aria-expanded="false">
            All activity
          </button>
          <div class="ms-panel" id="fa" role="group" aria-label="Filter by activity" hidden>
            <label class="ms-opt"
              ><input type="checkbox" value="active" /><span class="dot dot-active"></span>Active</label
            >
            <label class="ms-opt"
              ><input type="checkbox" value="stable" /><span class="dot dot-stable"></span>Stable</label
            >
            <label class="ms-opt"
              ><input type="checkbox" value="slowing" /><span class="dot dot-slowing"></span>Slowing</label
            >
            <label class="ms-opt"
              ><input type="checkbox" value="early" /><span class="dot dot-early"></span>Early</label
            >
            <label class="ms-opt"
              ><input type="checkbox" value="dormant" /><span class="dot dot-dormant"></span>Dormant</label
            >
          </div>
        </div>
      </div>
      <div class="fgroup">
        <label for="fr">Requires</label>
        <select id="fr">
          <option value="">Any</option>
          <option value="clean">No model / infra</option>
          <option value="warn">Model or infra</option>
        </select>
      </div>
      <span class="count" id="cnt"></span>
    </div>

    <div class="wrap">
      <table>
        <thead>
          <tr>
            <th data-col="tool" style="width: 20%">Tool</th>
            <th data-col="whatItDoes" style="width: 24%">What it does</th>
            <th data-col="conflict" style="width: 18%">Conflict / overlap</th>
            <th data-col="activityStatus" style="width: 11%">Activity</th>
            <th data-col="verdict" style="width: 9%">Verdict</th>
            <th data-col="decisionRule" style="width: 18%">Decision rule</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
    <script type="module" src="./comparison/main.ts"></script>
  </body>
</html>
