# GitHub Pages configuration.
# To publish: repository Settings then Pages, set Source to "Deploy from a branch",
# branch main (or your default), folder /docs. No local build is required; GitHub
# renders these Markdown files with Jekyll.
title: context-radar
description: >-
  A catalogue rating GitHub projects on agentic context efficiency:
  how cheaply an AI agent can work on them in tokens.
theme: jekyll-theme-cayman
show_downloads: false

# Keep repository meta and data out of the built site.
exclude:
  - README.md
  - CONTRIBUTING.md
  - templates
  - schema
