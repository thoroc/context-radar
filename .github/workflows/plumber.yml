name: plumber

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: getplumber/plumber@fdd2a2d0555bb3b33cbb2efff3b955dea5a6bbf0 # v0.4.3
        with:
          # score-push publishes a public A-E badge and makes the repo name
          # public. Keep it off; this catalogue is not ready to publish a score.
          score-push: false
          # Gate on grade B rather than a perfect 100. The default GITHUB_TOKEN
          # has no Administration:read scope (GitHub does not expose one to
          # workflow tokens), so Plumber cannot read main's detailed branch
          # protection and reports ISSUE-505 ("code owner approval not
          # required") even though it IS required. The finding stays visible in
          # the report; only the pass/fail gate is relaxed to the true posture.
          # Restore the default (drop this) once an App token with
          # Administration:read is wired in.
          min-score: B
