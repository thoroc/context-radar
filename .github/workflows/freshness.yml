name: freshness

on:
  schedule:
    # Sunday 18:00 UTC. GitHub cron is best-effort: it can be delayed or skipped,
    # only runs from the default branch, and auto-disables after 60 days idle.
    - cron: "0 18 * * 0"
  workflow_dispatch:
  push:
    # A merged refresh (recorded versions bumped) re-runs the sweep so the now
    # up-to-date tools' issues close within minutes, not on the next Sunday cron.
    branches: [main]
    paths:
      - data/context-reduction-tools.json

permissions:
  contents: read
  issues: write

# One run at a time; never cancel a run mid-write. Constant group so a manual
# dispatch and the schedule serialise instead of racing to open duplicate issues.
concurrency:
  group: freshness
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # Authenticate mise's GitHub releases API calls so tool installs are not
          # capped at the 60 req/hr unauthenticated rate limit.
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: mise run install
      # Observe upstream versions and classify drift into freshness-report.json.
      - name: Detect freshness drift
        run: mise run freshness
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Open or update one issue per drifting tool from that report.
      - name: Sync per-tool freshness issues
        run: mise run freshness:sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
