# Build the site with Vite (Bun + TypeScript) and deploy the output to GitHub
# Pages. The build writes static files to docs/, which is uploaded as-is; there
# is no Jekyll step.
name: Deploy Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do NOT cancel in-progress runs, so production
# deployments always finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single job: build with Vite, then publish the docs/ output.
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install the pinned toolchain (Bun, Node)
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2
      - name: Install dependencies
        run: mise run install
      - name: Build the site into docs/
        run: mise run build
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload docs/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
