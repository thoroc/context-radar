name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # Authenticate mise's GitHub releases API calls so tool installs are not
          # capped at the 60 req/hr unauthenticated rate limit.
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # Install JS dependencies so the TypeScript type-check has its types.
      - run: mise run install
      # Formatting and lint checks (prettier, markdownlint, yamllint, actionlint, biome).
      - run: mise run lint
      # TypeScript type-checking for the site source.
      - run: mise run typecheck
      # Data integrity: CSV source of truth and JSON mirror must agree.
      - run: mise run validate
