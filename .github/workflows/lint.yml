name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          # Authenticate mise's GitHub releases API calls so tool installs are not
          # capped at the 60 req/hr unauthenticated rate limit.
          github_token: ${{ secrets.GITHUB_TOKEN }}
      # Install JS dependencies so the TypeScript type-check has its types.
      - run: mise run install
      # Formatting and lint checks (prettier, markdownlint, yamllint, actionlint, biome).
      - run: mise run lint
      # Deterministic design-quality gate (impeccable detector): contrast, layout
      # overflow, literal-colour drift vs DESIGN.md, and generic AI-design tells.
      - run: mise run design:check
      # TypeScript type-checking for the site source.
      - run: mise run typecheck
      # Collocated unit tests (vitest) with whole-project coverage; fails if
      # coverage drops below the ratcheted floor in vitest.config.ts.
      - run: mise run test:coverage
      # Data integrity: CSV source of truth and JSON mirror must agree.
      - run: mise run validate
