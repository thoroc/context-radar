# Tool record template for the context-radar catalogue.
#
# Copy this file, fill it in, then ingest it with:
#   mise run data:add -- templates/my-tool.yaml
# That validates it against the schema (src/lib/schema.ts) and upserts it into
# data/context-reduction-tools.json by tool name (re-adding an existing name
# updates it). See plugin/skills/project-comparison-fetch/SKILL.md for the fetch
# protocol, the verdict guide, and the layer assignment guide.

# Immutable, URL-safe stable id. Leave this out on a first add: it is seeded from
# the name automatically and preserved on re-adds. Only set it by hand to carry the
# original id through a rename (change `tool`, keep the same `id`) so freshness
# prompts keyed on it are not orphaned.
# id: example-tool

# Unique display name; also the identifier used for upserts and conflict lists.
tool: Example Tool

# Canonical repository URL (must be a valid URL; re-verify on org/owner transfers).
githubUrl: https://github.com/owner/repo

# Primary display layer. Must be one of the enum values in src/lib/schema.ts
# (layerSchema), e.g. "Shell output", "Code navigation", "Agent memory persistence".
layer: Code navigation

# What it does and how it reduces context tokens.
whatItDoes: >-
  One or two sentences describing the tool and how it cuts context-window usage.

# Conflict / overlap with other tools.
conflict:
  # hard = MCP tool-name collision; soft = redundant role; either-or = pick one of
  # a set; stackable = complementary; none = no conflict.
  severity: none
  # Names of the tools this one conflicts or overlaps with.
  projects: []
  # Optional free-text explanation (kept verbatim; shown in the table).
  # note: ⛔ HARD ctx_* namespace collision with magic-context if both loaded.
  # Optional evidence backing this claim. Cite commit-SHA permalinks, not moving
  # branches. A "confirmed" status needs at least one source-code / official-docs
  # / release source; a README-only citation tops out at "caveated".
  # evidence:
  #   status: confirmed          # confirmed | caveated | refuted | unverified
  #   sources:
  #     - url: https://github.com/owner/repo/blob/<sha>/src/server.ts#L42
  #       quote: exposes search_code, matching an existing tool's tool name
  #       checkedOn: 2026-07-16
  #       evidenceType: source-code   # source-code|official-docs|readme|release|search|third-party

# Implementation runtime.
runtime:
  # One or more of: rust python typescript javascript node go powershell shell lua gleam none
  # Use [none] for built-ins, skill files, and curated lists.
  languages: [rust]
  # Optional free-text detail shown verbatim (e.g. "Rust binary; no model calls").
  detail: Rust binary; no model calls; no external deps

# Requirements. Start with ⚠ if it needs an LLM API key, external infra, or a
# model download; record the LLM dependency tier (see the skill).
requirements: Rust binary; no model calls; no external deps

# Licence.
licence:
  # SPDX-ish identifier, e.g. MIT, Apache-2.0, AGPL-3.0, PolyForm Noncommercial.
  spdx: MIT
  # Optional caveat, e.g. a missing LICENSE file or a dual-licence note.
  # warning: No LICENSE file visible in repo

# Verified star count as an integer, or null if unknown / not applicable.
stars: 1200

# Signed 30-day trend as a percentage (sign carries direction), or null if unknown.
trend: 5

# Activity detail. All fields optional except keep `notes` as the verbatim summary.
activity:
  contributors: 120
  latestVersion: v1.2.0
  releaseCount: 14
  # Date of the latest release, ISO YYYY-MM-DD.
  releasedOn: 2026-06-12
  corroboration: star-history.com
  notes: >-
    120 contributors, v1.2.0 (12 Jun 2026), daily commits, confirmed via star-history.com.

# Activity status.
activityStatus:
  # One of: active stable slowing early dormant none
  band: active
  # Display label without the band emoji, e.g. "Hyper-active", "Active (solo)".
  label: Hyper-active

# Adoption verdict.
verdict:
  # One of: best add add-if either-or watch reference drop
  decision: add
  # The reasoning that follows the decision (shown after "Add — ...").
  rationale: fills a clear role without problematic conflicts

# Free-text guidance, often with install commands and "do not run alongside X" caveats.
decisionRule: >-
  Install if you need structural code navigation. Do not run alongside <other tool>.

# Optional. Standalone benchmark / feature claims that map to no field above.
# A benchmark claim must carry a proofLedger (PROVEN | SUPPORTED | OPEN | REJECTED).
# extraClaims:
#   - kind: benchmark          # benchmark | feature
#     label: retrieval savings
#     statement: >-
#       93% mean tokens-after/tokens-before across 10 published queries against
#       the tool's own repo (self-selected, self-run).
#     proofLedger: SUPPORTED
#     evidence:
#       status: confirmed
#       sources:
#         - url: https://github.com/owner/repo/blob/<sha>/bench.ts
#           quote: runnable benchmark harness committed in the repo
#           checkedOn: 2026-07-16
#           evidenceType: source-code
