# Tool record template for the context-radar catalogue.
#
# Copy this file, fill every field, then ingest it with:
#   mise run data:add -- templates/my-tool.yaml
# That validates it against the schema (src/lib/schema.ts) and upserts it into
# data/context-reduction-tools.json by tool name (re-adding an existing name
# updates it). All fields are required and must be strings; use block scalars
# (|) for the long free-text fields so commas, quotes and emoji stay readable.
#
# See plugin/skills/project-comparison-fetch/SKILL.md for the fetch protocol,
# the verdict guide, and the layer assignment guide.

# Unique display name; also the identifier used for upserts and conflict rules.
tool: Example Tool

# Canonical repository URL (re-verify on org/owner transfers).
githubUrl: https://github.com/owner/repo

# Primary display layer. Must match one of the catalogue's layer strings, e.g.
# "Shell output", "Code navigation", "Agent memory persistence". Group by prefix.
layer: Code navigation

# What it does and how it reduces context tokens.
whatItDoes: >-
  One or two sentences describing the tool and how it cuts context-window usage.

# Conflict / overlap. Start with the hard-conflict marker (⛔) for MCP tool-name
# collisions, the soft-conflict marker (⚠) for redundant roles, or a dash for none.
conflict: '—'

# Implementation language or runtime, free text (e.g. "Rust binary", "Node.js 18+").
runtime: Rust binary

# Requirements. Start with ⚠ if it needs an LLM API key, external infra, or a
# model download; record the LLM dependency tier (see the skill).
requirements: Rust binary; no model calls; no external deps

# SPDX-ish licence string (e.g. MIT, Apache-2.0, AGPL-3.0, PolyForm NC).
licence: MIT

# Verified star count at the snapshot date. Small counts exact; large rounded.
stars: '1200'

# 30-day trend: direction marker plus approximate percentage, or a dash.
trend: ▲ +5%

# Free-text detail on contributors, releases, and corroborating sources.
activity: >-
  120 contributors, v1.2.0 (Jun 2026), daily commits.

# Status emoji plus label (e.g. "🟢 Hyper-active", "🟡 Active / Stable", "⚫ Dormant").
activityStatus: 🟢 Hyper-active

# Adoption verdict. One of: Best in class, Add, Add if you use [X],
# Either/or pick one, Watch, Reference only, Drop.
verdict: Add

# Free-text guidance, often with install commands and "do not run alongside X" caveats.
decisionRule: >-
  Install if you need structural code navigation. Do not run alongside <other tool>.
